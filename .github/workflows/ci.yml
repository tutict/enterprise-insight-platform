name: CI

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test backend
        run: mvn -B -f enterprise-insight-backend/pom.xml test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: enterprise-insight-backend-react/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: enterprise-insight-backend-react

      - name: Build frontend
        run: npm run build
        working-directory: enterprise-insight-backend-react

server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
    gateway:
      default-filters:
        - AddResponseHeader=X-Platform, AI-Harness-Compiler
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: metadata-service
          uri: lb://metadata-service
          predicates:
            - Path=/api/metadata/**
        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/ai/**
        - id: harness-compiler
          uri: lb://harness-compiler
          predicates:
            - Path=/api/compiler/**
        - id: agent-adapter
          uri: lb://agent-adapter
          predicates:
            - Path=/api/agent-adapter/**
        - id: orchestrator-service
          uri: lb://orchestrator-service
          predicates:
            - Path=/api/orchestrator/**

security:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-32-byte-minimum-secret}

management:
  endpoints:
    web:
      exposure:
        include: health,info

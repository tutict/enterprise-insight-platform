server:
  port: 8091

spring:
  application:
    name: orchestrator-service

agent:
  ollama:
    base-url: http://localhost:11434
    model: llama3.1
    request-timeout: 2m
    max-retries: 2
    retry-backoff: 1s
    verification-timeout: 3m
    output-root: ./agent-output

delivery:
  runs:
    storage-root: ${EIP_DELIVERY_RUNS_DIR:../runtime-logs/delivery-runs}
    max-list-size: 100

project:
  analysis:
    root: ${EIP_PROJECT_ANALYSIS_ROOT:}
    max-depth: 8
    max-files: 5000
    max-evidence-per-category: 80

name: ai-harness-generated-system
type: spring-boot-backend
requirement: 做一个带登录、用户管理和数据库持久化的Spring Boot系统
modules:
  - api
  - service
  - domain
  - authentication
  - persistence
constraints:
  language: Java 17+
  framework: Spring Boot 3
  quality: production-ready, readable, testable
  errorHandling: throw explicit exceptions and return clear API errors
outputFormat: Return complete source files with paths and code blocks
